<text x="850.0" y="844.0" text-anchor="middle" font-family="STIX Two Text, Georgia, serif" font-size="18" font-weight="400" fill="#6B7280">This is a single 2-step power-of-two calibration point. Larger checked points are currently blocked by the compact projection surface and the execution-proof ceiling, so the figure is intentionally a bar comparison rather than a fake trend line.</text>
<text x="850.0" y="874.0" text-anchor="middle" font-family="STIX Two Text, Georgia, serif" font-size="18" font-weight="400" fill="#6B7280">The result is split: the typed Phase44D boundary is slightly larger, but it avoids replaying the ordered Phase30 verifier surface and collapses verification latency at this checked point.</text>
