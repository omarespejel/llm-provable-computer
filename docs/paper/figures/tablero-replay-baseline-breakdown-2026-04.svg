<rect x="60" y="670" width="1680" height="250" rx="22" fill="#FFFFFF" stroke="#CBD5E1" />
<text x="900.0" y="710.0" text-anchor="middle" font-family="STIX Two Text, Georgia, serif" font-size="22" font-weight="700" fill="#0F172A">How to read the breakdown</text>
<text x="120.0" y="770.0" text-anchor="start" font-family="STIX Two Text, Georgia, serif" font-size="16" font-weight="400" fill="#334155">1. The replay baseline is not just canonical serialization and hashing; it also re-verifies each embedded proof.</text>
<text x="120.0" y="810.0" text-anchor="start" font-family="STIX Two Text, Georgia, serif" font-size="16" font-weight="400" fill="#334155">2. Source-chain commitment rebuild and per-step commitment rebuild are both major contributors at the checked frontiers.</text>
<text x="120.0" y="850.0" text-anchor="start" font-family="STIX Two Text, Georgia, serif" font-size="16" font-weight="400" fill="#334155">3. Equality comparison is negligible, so the main verifier gap comes from removing repeated replay work rather than one final compare.</text>
<text x="120.0" y="890.0" text-anchor="start" font-family="STIX Two Text, Georgia, serif" font-size="16" font-weight="400" fill="#334155">4. The strongest paper claim is replay replacement with preserved statement scope, not faster cryptographic verification.</text>
</svg>
