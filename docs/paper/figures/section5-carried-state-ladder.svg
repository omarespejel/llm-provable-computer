<svg xmlns="http://www.w3.org/2000/svg" width="700" height="255" viewBox="0 0 700 255" role="img" aria-labelledby="title desc">
  <title id="title">Carried-state packaging ladder</title>
  <desc id="desc">Statement-preserving carried-state packaging ladder from decode steps through a verified chain, segments, interval packages, rollups, a layout matrix, and a pre-recursive aggregation boundary. KV and lookup commitments are carried as continuity lanes.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#222222"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#006BA4"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FF800E"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .guide { stroke: #BBBBBB; stroke-width: 0.6; opacity: 0.25; }
      .box { fill: #ffffff; stroke: #222222; stroke-width: 0.9; }
      .box-mid { fill: #f7f7f7; stroke: #222222; stroke-width: 0.9; }
      .arrow { stroke: #222222; stroke-width: 1.1; marker-end: url(#arrow); fill: none; }
      .kv { stroke: #006BA4; stroke-width: 1.8; marker-end: url(#arrow-blue); fill: none; }
      .lookup { stroke: #FF800E; stroke-width: 1.8; marker-end: url(#arrow-orange); fill: none; }
      .kv-dash { stroke: #006BA4; stroke-width: 0.7; stroke-dasharray: 2 2; opacity: 0.65; }
      .lookup-dash { stroke: #FF800E; stroke-width: 0.7; stroke-dasharray: 2 2; opacity: 0.65; }
      .title { fill: #222222; font-family: 'STIX Two Text', 'Times New Roman', 'DejaVu Serif', serif; font-size: 12px; font-weight: 700; }
      .note { fill: #595959; font-family: 'STIX Two Text', 'Times New Roman', 'DejaVu Serif', serif; font-size: 9px; }
      .label { fill: #222222; font-family: 'STIX Two Text', 'Times New Roman', 'DejaVu Serif', serif; font-size: 10px; text-anchor: middle; dominant-baseline: middle; }
      .lane-label { font-family: 'STIX Two Text', 'Times New Roman', 'DejaVu Serif', serif; font-size: 10px; font-weight: 700; dominant-baseline: middle; }
      .kv-label { fill: #006BA4; }
      .lookup-label { fill: #FF800E; }
      .small { font-family: 'STIX Two Text', 'Times New Roman', 'DejaVu Serif', serif; font-size: 9px; text-anchor: middle; dominant-baseline: middle; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="700" height="255"/>

  <text class="title" x="44" y="30">Carried-state packaging ladder</text>
  <text class="note" x="44" y="48">Statement-preserving artifact layers; not recursive proof compression.</text>

  <line class="guide" x1="44" y1="94" x2="640" y2="94"/>
  <line class="guide" x1="44" y1="151" x2="640" y2="151"/>
  <line class="guide" x1="44" y1="197" x2="640" y2="197"/>

  <rect class="box" x="42" y="71" width="90" height="46" rx="5"/>
  <text class="label" x="87" y="88">decode</text>
  <text class="label" x="87" y="103">steps</text>

  <rect class="box" x="154" y="71" width="90" height="46" rx="5"/>
  <text class="label" x="199" y="88">verified</text>
  <text class="label" x="199" y="103">chain</text>

  <rect class="box-mid" x="266" y="71" width="100" height="46" rx="5"/>
  <text class="label" x="316" y="88">segments /</text>
  <text class="label" x="316" y="103">interval packages</text>

  <rect class="box-mid" x="388" y="71" width="100" height="46" rx="5"/>
  <text class="label" x="438" y="88">rollups /</text>
  <text class="label" x="438" y="103">layout matrix</text>

  <rect class="box" x="510" y="71" width="104" height="46" rx="5"/>
  <text class="label" x="562" y="88">aggregation</text>
  <text class="label" x="562" y="103">boundary</text>

  <path class="arrow" d="M 132 94 H 152"/>
  <path class="arrow" d="M 244 94 H 264"/>
  <path class="arrow" d="M 366 94 H 386"/>
  <path class="arrow" d="M 488 94 H 508"/>

  <path class="kv" d="M 87 151 H 562"/>
  <path class="lookup" d="M 87 197 H 562"/>
  <circle cx="87" cy="151" r="3.2" fill="#006BA4"/>
  <circle cx="562" cy="151" r="3.2" fill="#006BA4"/>
  <circle cx="87" cy="197" r="3.2" fill="#FF800E"/>
  <circle cx="562" cy="197" r="3.2" fill="#FF800E"/>

  <text class="lane-label kv-label" x="44" y="151">KV commitments</text>
  <text class="small kv-label" x="316" y="136">cumulative + frontier continuity</text>
  <text class="lane-label lookup-label" x="44" y="197">lookup commitments</text>
  <text class="small lookup-label" x="316" y="182">cumulative + frontier continuity</text>

  <line class="kv-dash" x1="87" y1="117" x2="87" y2="139"/>
  <line class="lookup-dash" x1="87" y1="117" x2="87" y2="185"/>
  <line class="kv-dash" x1="199" y1="117" x2="199" y2="139"/>
  <line class="lookup-dash" x1="199" y1="117" x2="199" y2="185"/>
  <line class="kv-dash" x1="316" y1="117" x2="316" y2="139"/>
  <line class="lookup-dash" x1="316" y1="117" x2="316" y2="185"/>
  <line class="kv-dash" x1="438" y1="117" x2="438" y2="139"/>
  <line class="lookup-dash" x1="438" y1="117" x2="438" y2="185"/>
  <line class="kv-dash" x1="562" y1="117" x2="562" y2="139"/>
  <line class="lookup-dash" x1="562" y1="117" x2="562" y2="185"/>
</svg>
