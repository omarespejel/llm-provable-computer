# Machine-readable evidence ledger for the Tablero technical-review package.
# `scripts/paper/paper_preflight.py` validates that every listed claim has
# paper anchors, source specs, checked evidence files, reproduction commands,
# and explicit non-claims. This is not a publication/default-lane promotion
# manifest: explicitly experimental evidence keeps its experimental path names,
# and preflight requires the claim boundary to say so.

- id: tablero_statement_preservation_theorem
  claim: "Tablero preserves the replay verifier's accepted statement set when the compact proof is sound, commitments bind, and the source emits all public facts needed by the boundary predicate."
  paper_locations:
    - docs/paper/tablero-typed-verifier-boundaries-2026.md#4. Statement Preservation
    - docs/paper/appendix-tablero-claim-boundary.md
  specs:
    - docs/engineering/tablero-soundness-note-2026-04-25.md
    - docs/engineering/tablero-hardening-packet-2026-04-25.md
  evidence_files:
    - docs/paper/tablero-typed-verifier-boundaries-2026.md
    - docs/paper/appendix-tablero-claim-boundary.md
  evidence_commands:
    - python3 scripts/paper/paper_preflight.py --repo-root .
    - scripts/run_tablero_formal_contract_suite.sh
  non_claims:
    - "Does not claim a new STARK soundness theorem."
    - "Does not claim recursive proof compression."

- id: tablero_cross_family_replay_avoidance
  claim: "On the explicitly labeled carry-aware experimental backend, the main typed-boundary path reproduces across three checked layout families with large replay-avoidance ratios at the 1024-step checked frontier."
  paper_locations:
    - docs/paper/tablero-typed-verifier-boundaries-2026.md#6.2 Cross-family transferability
    - docs/paper/appendix-methodology-and-reproducibility.md#5. What the cross-family result means
  specs:
    - docs/engineering/phase44d-carry-aware-experimental-family-matrix-gate-2026-04-25.md
    - docs/engineering/phase44d-carry-aware-2x2-constant-surface-note-2026-04-25.md
  evidence_files:
    - docs/paper/evidence/tablero-results-overview-2026-04.tsv
    - docs/paper/evidence/tablero-results-overview-2026-04.json
    - docs/paper/figures/tablero-results-overview-2026-04.svg
    - docs/engineering/evidence/phase44d-carry-aware-experimental-family-matrix-2026-04.tsv
    - docs/engineering/evidence/phase44d-carry-aware-family-constant-surface-2026-04.tsv
  evidence_commands:
    - python3 scripts/paper/generate_tablero_results_overview.py
    - python3 scripts/paper/paper_preflight.py --repo-root .
  non_claims:
    - "Does not claim faster FRI verification."
    - "Does not claim family-invariant verifier time."
    - "Does not claim a matched external benchmark win."
    - "Does not claim publication-default backend behavior."

