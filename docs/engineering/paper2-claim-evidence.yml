  positive_tests:
    - phase31_decode_boundary_manifest_accepts_matching_phase29_and_phase30_sources
  negative_tests:
    - phase31_decode_boundary_manifest_rejects_step_count_mismatch
    - phase31_decode_boundary_manifest_rejects_boundary_mismatch
