name: paper preflight

# Paper preflight is manual-only by policy. Run local preflight first, then
# dispatch this workflow intentionally for release or paper-bundle checks.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  paper-preflight:
    name: paper preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Install Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Run paper preflight checks
        run: |
          python --version
          python scripts/paper/paper_preflight.py --repo-root .
