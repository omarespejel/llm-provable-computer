name: PR hardening contract

# The hardening contract is manual-only by policy. Trusted-core PRs still need
# local validation and the hardening checklist in the PR body before review.
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to validate"
        required: true
        type: number

permissions:
  contents: read
  pull-requests: read

jobs:
  hardening-contract:
    name: hardening contract
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR hardening contract
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          [[ "$PR_NUMBER" =~ ^[1-9][0-9]*$ ]] || {
            echo "Invalid PR_NUMBER: must be a positive integer" >&2
            exit 1
          }

          pr_metadata="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json body,changedFiles)"
          files_json="$(
            gh api --paginate \
              "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/files?per_page=100" \
              --jq '.[] | {path: .filename, previous_path: (.previous_filename // "")} | @json' |
            python3 -c 'import json, sys; print(json.dumps([json.loads(line) for line in sys.stdin if line.strip()]))'
          )"
          pr_json_path="${RUNNER_TEMP:-/tmp}/pr-hardening-contract.json"
          python3 - "$pr_metadata" "$files_json" > "$pr_json_path" <<'PY'
          import json
          import sys

          pr = json.loads(sys.argv[1])
          pr["files"] = json.loads(sys.argv[2])
          print(json.dumps(pr))
          PY
          export PR_JSON_PATH="$pr_json_path"

          python3 - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          pr_number = os.environ.get("PR_NUMBER") or ""
          raw_pr_path = os.environ.get("PR_JSON_PATH") or ""

          if not pr_number.isdigit() or int(pr_number) <= 0:
              print("PR number input must be a positive integer.")
              sys.exit(1)

          if not raw_pr_path:
              print("PR metadata path is required.")
              sys.exit(1)

          try:
              raw_pr = Path(raw_pr_path).read_text(encoding="utf-8")
              pr = json.loads(raw_pr)
          except OSError as exc:
              print(f"Could not read PR metadata file {raw_pr_path}: {exc}")
              sys.exit(1)
          except json.JSONDecodeError as exc:
              print(f"Could not parse PR metadata file {raw_pr_path}: {exc}")
              sys.exit(1)

          body = pr.get("body") or ""
          file_entries = pr.get("files", [])
          changed = []
          for file_entry in file_entries:
              for key in ("path", "previous_path"):
                  path = file_entry.get(key) or ""
                  if path:
                      changed.append(path)
          changed_total = pr.get("changedFiles")
          if isinstance(changed_total, int) and changed_total != len(file_entries):
              print(
                  "Paginated PR file list length does not match changedFiles: "
                  f"{len(file_entries)} != {changed_total}"
              )
              sys.exit(1)

          trusted_prefixes = (
              "src/stwo_backend/",
              "src/bin/tvm.rs",
              "src/proof.rs",
              "src/verification.rs",
              "tests/",
              ".github/workflows/",
              "scripts/local_merge_gate.sh",
              "scripts/run_",
              "scripts/hardening_test_names.sh",
              "docs/engineering/hardening-policy.md",
              "docs/engineering/hardening-strategy.md",
              "zizmor.yml",
          )

          touches_trusted_core = any(
              path.startswith(trusted_prefixes) or path in trusted_prefixes
              for path in changed
          )

          if not touches_trusted_core:
              print("No trusted-core paths changed; skipping hardening contract.")
              sys.exit(0)

          required_snippets = ["## Validation", "## Hardening"]
          missing = [snippet for snippet in required_snippets if snippet not in body]
          if missing:
              print("Trusted-core PRs must include the hardening contract in the PR body.")
              print("Missing snippets:")
              for snippet in missing:
                  print(f"  - {snippet}")
              sys.exit(1)

          required_checked_lines = [
              "- [x] targeted regression and tamper-path coverage added or updated",
              "- [x] oracle or differential checks added/updated, or marked not applicable below",
              "- [x] resource-bound / untrusted-input impact reviewed, or marked not applicable below",
              "- [x] Kani / formal-kernel impact reviewed, or marked not applicable below",
          ]
          lower_body = body.lower()
          body_lines = [line.strip().lower() for line in lower_body.splitlines()]
          unchecked = []
          for line in required_checked_lines:
              if line in body:
                  continue
              item_text = line[len("- [x] "):].lower()
              line_has_na = any(
                  item_text in candidate
                  and ("n/a" in candidate or "not applicable" in candidate)
                  for candidate in body_lines
              )
              if not line_has_na:
                  unchecked.append(line)
          if unchecked:
              print("Trusted-core PRs must check each hardening item or document it as N/A.")
              print("Unchecked or undocumented items:")
              for line in unchecked:
                  print(f"  - {line}")
              sys.exit(1)

          print("Trusted-core PR body includes the hardening contract.")
          PY
